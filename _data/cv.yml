        summary: |
          I do full-cycle testing for the Petrovich (one of Russia's biggest hardware retailers) catalog and related areas — products, listings, search, reviews. About 30% frontend, most of it backend: microservices, ERP integrations, external systems.
          Daily tools: Postman, Swagger, PostgreSQL, Jira, Confluence, Jenkins, Gitlab. Sometimes Redis and Kafka.
          I write test plans for big tasks, test cases, manage regression tests, and see features through to production. I also write UI and API autotests (Python, Selenium, Playwright), write testing docs, mentor new team members, and built a few Chrome extensions to make work easier.
        highlights:
