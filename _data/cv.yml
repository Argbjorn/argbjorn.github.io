          I handled testing, trained staff, and set up QA processes. Main achievements: migrated 40+ templates to a new responsive design, added analytics to the restaurant dashboard, built a reporting system, set up server and app monitoring, created an email system with integrations, built dozens of automation tools. Created a knowledge base with 300+ articles, managed the team, and did hiring.

